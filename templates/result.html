<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Prediction Result</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);

}

.container{

    width:500px;

    background:rgba(255,255,255,.12);

    backdrop-filter:blur(15px);

    border-radius:20px;

    padding:30px;

    text-align:center;

    color:white;

    box-shadow:0 15px 35px rgba(0,0,0,.4);

}

.container h1{

    margin-bottom:25px;

}

.container img{

    width:300px;

    border-radius:15px;

    border:4px solid white;

    margin-bottom:25px;

}

.result-box{

    background:white;

    color:#333;

    border-radius:15px;

    padding:20px;

    margin-top:20px;

}

.result-box h2{

    margin:15px 0;

}

.prediction{

    font-size:28px;

    font-weight:bold;

    color:red;

}

.confidence{

    color:#0072ff;

    font-size:24px;

    font-weight:bold;

}

a{

    display:inline-block;

    margin-top:25px;

    padding:12px 30px;

    text-decoration:none;

    color:white;

    background:linear-gradient(to right,#00c6ff,#0072ff);

    border-radius:10px;

    font-size:18px;

    transition:.3s;

}

a:hover{

    transform:translateY(-3px);

    box-shadow:0 8px 20px rgba(0,114,255,.5);

}

</style>

</head>

<body>

<div class="container">

    <h1>🩺 Prediction Result</h1>

    <img src="/{{ image_path }}" alt="Uploaded X-Ray">

    <div class="result-box">

        <h2>Prediction</h2>

        <div class="prediction">

            {{ prediction }}

        </div>

        <hr style="margin:20px 0;">

        <h2>Confidence</h2>

        <div class="confidence">

            {{ confidence }} %

        </div>

    </div>

    <a href="/">⬅ Upload Another Image</a>

</div>

</body>

</html>
